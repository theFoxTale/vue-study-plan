name: Check markdown links

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check relative markdown links
        run: npm run check:links
